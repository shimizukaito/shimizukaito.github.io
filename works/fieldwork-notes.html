    <meta charset="utf-8" />

    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html#top"><span class="brand-mark"><img src="../assets/astronaut.ico" alt="" /></span><span>Shimizu Kaito</span></a>
      <nav class="nav" aria-label="主要ナビゲーション">
        <a href="../index.html#works">Works</a>
        <a href="../about.html#about">About</a>
        <a href="../about.html#achievements">Achievements</a>
        <a href="../index.html#contact">Contact</a>
      </nav>
    </header>
    <main class="work-detail">
      <a class="back-link" href="../index.html#works">← Worksへ戻る</a>
      <section class="detail-hero">
        <div>
          <h1>観察記録のためのノートツール</h1>
          <p>写真、位置、短いメモを素早くまとめ、後から分析しやすくするための個人用ツールです。</p>
        </div>
        <img class="detail-cover" src="../assets/project-field.svg" alt="フィールドワーク記録ツールの代表画像" />
      </section>
      <section class="detail-stack">
        <div>
          <p class="eyebrow">Technology</p>
          <ul class="tech-list"><li>React</li><li>Map</li><li>JavaScript</li><li>Research Log</li></ul>
        </div>
        <div class="detail-description">
          <p>現地での気づきを逃さず残すため、入力項目を最小限にした記録ツールを制作しました。後から地図やタグを使って見返し、パターンを抽出できるようにしています。</p>
        </div>
        <div class="detail-gallery-shell" aria-label="作品写真">
          <div class="detail-gallery">
            <img src="../assets/project-field.svg" alt="地図と記録の画面" />
            <img src="../assets/project-archive.svg" alt="記録の一覧" />
            <img src="../assets/project-commerce.svg" alt="モバイル画面の構成" />
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"><span>© 2026 Shimizu Kaito</span><button class="theme-toggle" type="button" aria-label="テーマを切り替える">◐</button></footer>
